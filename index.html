<!DOCTYPE html>
<html>
<head>
    <title>Math Quiz</title>
</head>
<body>
<!-- START OF TEST -->
<form>
    <p>
        <label for="name">Name:</label><br>
        <input type="text" id="name" name="name" required>
    </p>

    <p>
        <b>1. What is the square root of &radic;25?</b><br>
        <input type="radio" id="q1a" name="q1" value="3"> <label for="q1a">3</label><br>
        <input type="radio" id="q1b" name="q1" value="5"> <label for="q1b">5</label><br>
        <input type="radio" id="q1c" name="q1" value="10"> <label for="q1c">10</label>
    </p>

    <p>
        <b>2. What is 2 &times; 2?</b><br>
        <input type="radio" id="q2a" name="q2" value="2"> <label for="q2a">2</label><br>
        <input type="radio" id="q2b" name="q2" value="4"> <label for="q2b">4</label><br>
        <input type="radio" id="q2c" name="q2" value="6"> <label for="q2c">6</label>
    </p>

    <p>
        <b>3. What is 21 &divide; 3?</b><br>
        <input type="radio" id="q3a" name="q3" value="5"> <label for="q3a">5</label><br>
        <input type="radio" id="q3b" name="q3" value="7"> <label for="q3b">7</label><br>
        <input type="radio" id="q3c" name="q3" value="9"> <label for="q3c">9</label>
    </p>

    <p>
        <label for="problem">Word problem: You have 5 candies and buy 3 more. How many do you have now?(Show your work):</label><br>
        <textarea id="problem" name="problem" rows="3" cols="40"></textarea>
    </p>

    <button type="submit">Submit</button>
</form>
<!-- END OF TEST -->
</body>
</html>
